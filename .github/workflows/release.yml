name: Release GUI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: 安装 Poetry
        run: python -m pip install poetry

      - name: 安装依赖
        run: poetry install --with dev

      - name: 校验标签版本
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $projectVersion = poetry version --short
          if ($tagVersion -ne $projectVersion) {
            throw "标签版本 v$tagVersion 与 pyproject.toml 中的版本 $projectVersion 不一致"
          }

      - name: 构建统一 GUI
        run: poetry run pyinstaller lan_zou_zip_tool_gui.spec --clean

      - name: 重命名发布文件
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Copy-Item "dist/lan_zou_zip_tool_gui.exe" "dist/lan_zou_zip_tool_gui-$version.exe"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gui-executable
          path: dist/lan_zou_zip_tool_gui-${{ github.ref_name }}.exe

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/lan_zou_zip_tool_gui-${{ github.ref_name }}.exe
