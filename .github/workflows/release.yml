name: Release GUI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: 安装 Poetry
        run: python -m pip install poetry

      - name: 安装依赖
        run: poetry install --with dev

      - name: 构建 split_gui
        run: poetry run pyinstaller split_gui.spec --clean

      - name: 构建 restore_gui
        run: poetry run pyinstaller restore_gui.spec --clean

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gui-executables
          path: |
            dist/split_gui.exe
            dist/restore_gui.exe

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/split_gui.exe
            dist/restore_gui.exe
